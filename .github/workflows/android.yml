name: Android CI

on:
  push:
    branches: [main]
    tags: ['milestone-*', 'v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
      - name: Test, lint and build
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug assembleDebugAndroidTest --stacktrace
      - name: Upload milestone APK
        if: startsWith(github.ref, 'refs/tags/milestone-') || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Awesome-ToDo-debug-${{ github.ref_name }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
